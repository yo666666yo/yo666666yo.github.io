# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: yo666666yo 的博客
subtitle: AI 研究笔记与生活随笔
description: 记录 AI 研究、机器学习、LLM、论文阅读与日常观察的个人博客。
keywords: AI,LLM,机器学习,深度学习,论文阅读,生活随笔,blog,yo666666yo
author: yo666666yo
language: zh-CN
timezone: Asia/Shanghai

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://yo666666yo.github.io
permalink: posts/:abbrlink/
permalink_defaults:
pretty_urls:
  trailing_index: false # Keep canonical URLs clean, e.g. /posts/xxx/
  trailing_html: false # Keep canonical URLs clean, e.g. /about/

# abbrlink - stable short URLs even for Chinese titles
abbrlink:
  alg: crc32
  rep: hex

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: false
syntax_highlighter: prismjs
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: 未分类
category_map:
  研究: research
  生活: life
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: false

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'date'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
  - .nojekyll
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: butterfly

# Local search (hexo-generator-search)
search:
  path: search.xml
  field: all
  content: true

# RSS feed (hexo-generator-feed)
feed:
  type: atom
  path: atom.xml
  limit: 20

# Sitemap (hexo-generator-sitemap)
sitemap:
  path: sitemap.xml

# External-link SEO (hexo-filter-nofollow)
nofollow:
  enable: true
  field: site
  exclude:

# Markdown-it renderer + KaTeX plugin (replaces default marked)
markdown:
  preset: default
  render:
    html: true
    xhtmlOut: false
    breaks: true
    linkify: true
    typographer: true
  plugins:
    - '@traptitech/markdown-it-katex'

# Deployment - handled by GitHub Actions, no local deploy needed
deploy:
  type: ''
